{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<h1>Login</h1>
<form method="post">
  <label for="username">Username</label>
  <input type="text" name="username" type="text" />
  <br>
  <label for="password">Password</label>
  <input type="password" name="password"/>
  <br>
  <input type="submit" value="Login" />
</form>
{% endblock content %}
